<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ETF 份额雷达</title>
    <link rel="stylesheet" href="styles.css?v=982a5fc3">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>ETF 份额雷达</h1>
          <p id="freshness" class="freshness">加载中</p>
        </div>
        <div class="top-actions">
          <label class="search">
            <span>⌕</span>
            <input id="searchInput" type="search" placeholder="搜索基金或代码" autocomplete="off">
          </label>
          <label class="auto-toggle" id="autoToggle" title="每 5 分钟自动检查新数据">
            <input type="checkbox" id="autoRefreshInput" checked>
            <span>自动更新</span>
          </label>
          <button id="refreshButton" class="icon-button" type="button" title="刷新数据">↻</button>
        </div>
      </header>

      <section id="kpiGrid" class="kpi-grid" aria-label="核心指标"></section>

      <section class="daily" id="dailySection" aria-label="较昨日变化">
        <div class="daily-head">
          <h2>较昨日变化</h2>
          <span id="dailyDate" class="daily-date"></span>
        </div>
        <div class="daily-grid" id="dailyGrid"></div>
      </section>

      <section class="charts" aria-label="走势与资金流">
        <div class="group-bar" id="groupBar">
          <span class="group-label">分组</span>
          <div class="chip-row" id="groupingChips"></div>
        </div>
        <article class="chart-panel trend-panel">
          <div class="chart-head">
            <h2>分类走势</h2>
            <div class="chip-row" id="trendRange"></div>
          </div>
          <div id="trendLegend" class="chart-legend"></div>
          <div class="chart-body" id="trendBody">
            <svg id="trendChart" viewBox="0 0 960 300" preserveAspectRatio="none" role="img" aria-label="分类走势图"></svg>
            <div id="trendTooltip" class="chart-tooltip" hidden></div>
          </div>
          <p class="chart-note">等权合成：分组内成分 ETF 收盘价在区间起点归一为 100 后取平均。</p>
        </article>
        <article class="chart-panel flow-panel">
          <div class="chart-head">
            <h2>分类对比</h2>
            <div class="chip-row" id="flowMetricChips"></div>
          </div>
          <div class="chart-subhead">
            <div class="chip-row" id="flowWindowChips"></div>
          </div>
          <div class="chart-body">
            <svg id="flowChart" viewBox="0 0 460 300" preserveAspectRatio="none" role="img" aria-label="分类对比图"></svg>
          </div>
          <p class="chart-note" id="flowNote">板块内 ETF 金额净流入合计，亿元。</p>
        </article>
      </section>

      <section class="rotation-section" id="rotationSection" aria-label="ETF 资金轮动">
        <div class="section-head">
          <div>
            <h2>ETF 资金轮动</h2>
            <p>资金净流入 = 份额变动 × 净值估算</p>
          </div>
          <div class="chip-row" id="rotationWindowChips"></div>
        </div>
        <div class="rotation-kpis" id="rotationKpis"></div>
        <div class="rotation-grid">
          <div class="rotation-chart-wrap">
            <svg id="rotationChart" viewBox="0 0 960 300" preserveAspectRatio="none" role="img" aria-label="ETF 板块资金轮动图"></svg>
          </div>
          <div class="rotation-readout" id="rotationReadout"></div>
        </div>
      </section>

      <section class="pressure-section" id="pressureSection" aria-label="ETF β 压强">
        <div class="section-head">
          <div>
            <h2>ETF β 压强</h2>
            <p id="pressureFreshness">持仓穿透数据</p>
          </div>
          <div class="segmented compact" id="pressureFilter">
            <button class="active" type="button" data-pressure="all">全部</button>
            <button type="button" data-pressure="etf_increase">ETF 净增</button>
            <button type="button" data-pressure="etf_decrease">ETF 净减</button>
          </div>
        </div>
        <div class="pressure-kpis" id="pressureKpis"></div>
        <div class="chip-row pressure-sort" id="pressureSort"></div>
        <div class="pressure-grid">
          <div class="pressure-table-wrap">
            <table class="pressure-table">
              <thead id="pressureTableHead"></thead>
              <tbody id="pressureTableBody"></tbody>
            </table>
          </div>
          <aside class="pressure-detail" id="pressureDetail"></aside>
        </div>
      </section>

      <section class="controls" aria-label="筛选和排序">
        <div class="segmented" id="flowFilter">
          <button class="active" type="button" data-flow="all">全部</button>
          <button type="button" data-flow="inflow">净流入</button>
          <button type="button" data-flow="outflow">净流出</button>
        </div>
        <div class="segmented" id="metricMode">
          <button class="active" type="button" data-metric="amount_delta_100m">金额</button>
          <button type="button" data-metric="share_delta_yi">份额</button>
          <button type="button" data-metric="return_pct">涨跌幅</button>
        </div>
        <label class="select-label">
          <span>板块</span>
          <select id="categorySelect"></select>
        </label>
        <label class="select-label">
          <span>排序</span>
          <select id="sortWindow"></select>
        </label>
        <button id="sortDirection" class="direction-button" type="button" data-dir="desc">降序</button>
      </section>

      <section class="table-panel">
        <div class="table-title">
          <h2>份额资金流热力表</h2>
          <span id="rowCount"></span>
        </div>
        <div class="table-wrap">
          <table>
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>

      <section class="methodology">
        <h2>口径</h2>
        <div class="method-grid">
          <p>份额净流入 = 当前份额 - 窗口起点份额。</p>
          <p>金额净流入 = 份额净流入 × 当前净值或收盘价。</p>
          <p>窗口锚点遇到节假日或停牌时，取目标日前最近一个可用交易日。</p>
          <p>金额净流入是申赎份额变化估算，不等同于二级市场成交额。</p>
        </div>
        <div id="sources" class="sources"></div>
      </section>
    </main>
    <script>window.__SNAPSHOT_URL__ = "dashboard_snapshot.json";</script>
    <script src="app.js?v=982a5fc3"></script>
  </body>
</html>
