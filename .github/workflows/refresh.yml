name: refresh-data

# 云端定时抓取 ETF 数据并发布到 Pages（电脑不开机也能更新）。
# 安全阀：只有抓到的数据完整（0 缺失）才提交推送，否则跳过，绝不用坏数据覆盖线上。

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "抓到完整数据时是否提交推送"
        type: boolean
        default: true
  schedule:
    # 工作日 13:00 UTC = 北京时间 21:00（沪深份额数据晚间发布）
    - cron: "0 13 * * 1-5"

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TQDM_DISABLE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and build (with source diagnostics)
        run: |
          # 用 timeout 硬性封顶：若数据源在 runner 上挂起，20 分钟后中止，
          # 让后续完整性检查判为不完整并使 run 失败（触发邮件），
          # 而不是耗满 30 分钟 job 超时后 cancelled（不发通知）。
          timeout 1200 python -m etf_radar.cli refresh \
            --preset core --preset bond --preset dividend \
            --window-set full \
            --retries 3 --retry-sleep 2 --price-pause 0.5 --max-passes 2 \
            --pages-out docs || echo "refresh exited non-zero/超时（继续做完整性检查）"

      - name: Evaluate completeness
        id: check
        run: |
          python - <<'PY'
          import json, os
          from etf_radar.metrics import missing_data_codes
          d = json.load(open("data/dashboard_snapshot.json"))
          missing = missing_data_codes(d)
          rows = len(d["rows"])
          errs = len(d.get("source_errors", []))
          print(f"rows={rows} missing={len(missing)} source_errors={errs} as_of={d['meta']['as_of']}")
          if missing:
              print("missing codes:", " ".join(missing))
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"rows={rows}\n")
              fh.write(f"missing={len(missing)}\n")
          PY

      # 定时触发时 inputs.publish 为 null（GitHub 表达式里 null 与 false 都当 0，
      # 故不能写 inputs.publish != false，否则定时运行会被判为不发布）。改为：
      # 数据完整 且（非手动触发 或 手动且勾选发布）。
      - name: Publish if complete
        if: ${{ steps.check.outputs.missing == '0' && (github.event_name != 'workflow_dispatch' || inputs.publish) }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs data/dashboard_snapshot.json
          if git diff --cached --quiet; then
            echo "no changes to publish"
          else
            as_of=$(python -c "import json;print(json.load(open('data/dashboard_snapshot.json'))['meta']['as_of'])")
            git commit -m "data: cloud refresh as_of ${as_of}"
            # 兼容本机 cron 并发推送：先 rebase 拉取远端再推。
            git pull --rebase --autostash origin main || true
            git push
            echo "published as_of ${as_of}"
          fi

      # 抓取不完整（数据源不可达/部分失败）视为失败，触发 GitHub 默认的失败邮件通知；
      # 线上数据不会被覆盖（上一步已按 missing==0 门控）。数据「无变化」仍算成功，不误报。
      - name: Fail if incomplete
        if: ${{ steps.check.outputs.missing != '0' }}
        run: |
          echo "::error::云端抓取不完整（missing=${{ steps.check.outputs.missing }}），未发布，线上数据保持不变"
          exit 1
